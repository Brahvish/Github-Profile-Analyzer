services:
  - type: web
    name: gitinsight-api
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: ALLOWED_ORIGINS
        value: https://your-gitinsight.vercel.app
    healthCheckPath: /api/health
    autoDeploy: true
